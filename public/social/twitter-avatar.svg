<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="avatarBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="200" fill="url(#avatarBg)"/>

  <!-- Simplified wrench icon representing tools -->
  <g transform="translate(200, 200)" fill="none" stroke="white" stroke-width="14" stroke-linecap="round" stroke-linejoin="round">
    <!-- Wrench handle -->
    <line x1="-40" y1="40" x2="40" y2="-40"/>
    <!-- Wrench head -->
    <circle cx="-50" cy="50" r="28"/>
    <path d="M-30,30 L-22,38" stroke-width="10"/>
  </g>
</svg>