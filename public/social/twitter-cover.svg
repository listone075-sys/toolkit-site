<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="500" viewBox="0 0 1500 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af"/>
      <stop offset="50%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1500" height="500" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.05" stroke="white" stroke-width="1">
    <line x1="0" y1="0" x2="1500" y2="0"/><line x1="0" y1="50" x2="1500" y2="50"/>
    <line x1="0" y1="100" x2="1500" y2="100"/><line x1="0" y1="150" x2="1500" y2="150"/>
    <line x1="0" y1="200" x2="1500" y2="200"/><line x1="0" y1="250" x2="1500" y2="250"/>
    <line x1="0" y1="300" x2="1500" y2="300"/><line x1="0" y1="350" x2="1500" y2="350"/>
    <line x1="0" y1="400" x2="1500" y2="400"/><line x1="0" y1="450" x2="1500" y2="450"/>
    <line x1="0" y1="0" x2="0" y2="500"/><line x1="50" y1="0" x2="50" y2="500"/>
    <line x1="100" y1="0" x2="100" y2="500"/><line x1="150" y1="0" x2="150" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="500"/>
  </g>

  <!-- Decorative tool icons (simplified) -->
  <!-- Wrench icon -->
  <g transform="translate(80, 80)" opacity="0.08" fill="white">
    <rect x="0" y="0" width="340" height="340" rx="20"/>
  </g>

  <!-- Main text -->
  <text x="750" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="56" font-weight="800" fill="white" letter-spacing="-1">
    48 Free Online Tools
  </text>
  <text x="750" y="250" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" font-weight="400" fill="rgba(255,255,255,0.85)">
    No Upload · No Sign-Up · All in Your Browser
  </text>

  <!-- Feature pills -->
  <g transform="translate(750, 310)" text-anchor="middle">
    <rect x="-380" y="0" width="110" height="36" rx="18" fill="rgba(255,255,255,0.15)"/>
    <text x="-325" y="25" font-family="system-ui, sans-serif" font-size="14" fill="white">📸 Images</text>

    <rect x="-250" y="0" width="100" height="36" rx="18" fill="rgba(255,255,255,0.15)"/>
    <text x="-200" y="25" font-family="system-ui, sans-serif" font-size="14" fill="white">📄 PDFs</text>

    <rect x="-130" y="0" width="120" height="36" rx="18" fill="rgba(255,255,255,0.15)"/>
    <text x="-70" y="25" font-family="system-ui, sans-serif" font-size="14" fill="white">✍️ Markdown</text>

    <rect x="10" y="0" width="110" height="36" rx="18" fill="rgba(255,255,255,0.15)"/>
    <text x="65" y="25" font-family="system-ui, sans-serif" font-size="14" fill="white">💻 Dev Tools</text>

    <rect x="140" y="0" width="110" height="36" rx="18" fill="rgba(255,255,255,0.15)"/>
    <text x="195" y="25" font-family="system-ui, sans-serif" font-size="14" fill="white">🔢 Calculators</text>

    <rect x="270" y="0" width="95" height="36" rx="18" fill="rgba(255,255,255,0.15)"/>
    <text x="318" y="25" font-family="system-ui, sans-serif" font-size="14" fill="white">🤖 AI Tools</text>
  </g>

  <!-- URL -->
  <text x="750" y="450" text-anchor="middle" font-family="system-ui, monospace" font-size="20" fill="rgba(255,255,255,0.6)">
    toolcraftbox.com
  </text>
</svg>